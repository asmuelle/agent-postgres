# cargo-deny configuration — run with `cargo deny check advisories`.
#
# Every ignore below is a tracked exception, not a dismissal. When an entry's
# upstream fix lands, remove it so CI starts enforcing again.

[advisories]
ignore = [
    # rsa Marvin timing side-channel — no patched release exists (upstream is
    # still migrating to a constant-time implementation). Pulled in transitively
    # via russh 0.61 → ssh-key → rsa for SSH RSA key support. Low practical risk
    # for this client and no safe upgrade is available.
    # TRACKED: drop when the rsa crate ships a constant-time fix.
    { id = "RUSTSEC-2023-0071", reason = "no fix available; transitive via russh 0.61 / ssh-key" },

    # paste unmaintained/archived — build-time proc-macro only, no exploit path.
    # Pulled in transitively via parquet ^54 (→ ssh-commander-pg-parquet); the
    # upstream parquet ^54 pin blocks moving off the dependency, and no patched
    # release of paste exists. Same parquet ^54 chain that also pins thrift ^0.17.
    # TRACKED: drop when parquet drops paste or a maintained drop-in is adopted.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained — transitive proc-macro via parquet ^54, build-time only" },

    # NOTE: thrift excessive-allocation on parse — CVE-2026-43868 /
    # GHSA-2f9f-gq7v-9h6m, affects thrift <= 0.22.0 with NO patched release.
    # Pulled in transitively via parquet ^54 (→ ssh-commander-pg-parquet); not
    # optional in parquet. The vuln triggers when *parsing* untrusted
    # Thrift/parquet input; pgAgent only ever *writes* parquet from trusted DB
    # rows (FFI parquet_open/append/close — no reader), so the path is
    # unreachable. Dismissed in GitHub Dependabot as tolerable_risk (alert #5).
    # No RustSec advisory ID exists yet, so there is nothing for cargo-deny to
    # match — add an `{ id = ... }` entry here if/when one is published.
    # TRACKED: drop when parquet drops thrift or thrift ships a fix.
]
